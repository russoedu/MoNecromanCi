name: CI

# Generated by MoNecromanCI. The scripts under node_modules/monecromanci-toolchain's
# build-templates/ are the shared engine (same scripts Azure Pipelines runs);
# this workflow maps GitHub's context onto the BUILD_*/SYSTEM_* variables those
# scripts read. Re-sync with 'monecromanci doctor'.

on:
  push:
    branches: [dev, development, uat, master, main]
    paths-ignore: ['docs/**', '**/*.md']
  pull_request:
    branches: [dev, development, uat, master, main]
    paths-ignore: ['docs/**', '**/*.md']

permissions:
  # write: [04] Publish libraries pushes the version-bump commit + release tags
  # that `nx release version` creates from conventional commits.
  contents: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    # Job-level env may only use the github/needs/strategy/matrix/vars/inputs
    # contexts. The runner- and secrets-derived values live in the "Configure
    # CI environment" step below (step `run` permits both), exported via
    # $GITHUB_ENV so every later step still sees them.
    env:
      BUILD_REASON: ${{ github.event_name == 'pull_request' && 'PullRequest' || 'IndividualCI' }}
      BUILD_SOURCEBRANCHNAME: ${{ github.ref_name }}
      BUILD_SOURCEVERSION: ${{ github.sha }}
      SYSTEM_PULLREQUEST_TARGETBRANCH: ${{ github.base_ref }}
      BUILD_SOURCESDIRECTORY: ${{ github.workspace }}
      BUILD_BUILDID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all refs for affected detection
        run: git fetch --all --prune --tags
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Configure CI environment
        run: |
          echo "BUILD_ARTIFACTSTAGINGDIRECTORY=${{ runner.temp }}/artifacts" >> "$GITHUB_ENV"
          echo "NODE_AUTH_TOKEN=${{ secrets.NODE_AUTH_TOKEN || github.token }}" >> "$GITHUB_ENV"
      - name: Prepare artifact staging directory
        run: mkdir -p "$BUILD_ARTIFACTSTAGINGDIRECTORY"
      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0
      # Drift gate: report-only doctor exits non-zero when any tool-owned file
      # differs from the templates (a half-committed or stale tree), failing
      # here in seconds with the exact file names instead of exploding
      # downstream in lint/test/build with an unrelated-looking error.
      - name: "[01] Verify tool-owned config is in sync (monecromanci doctor)"
        run: npx monecromanci doctor
      - name: "[01] Preparation"
        run: node node_modules/monecromanci-toolchain/build-templates/01-preparation.mjs
      - name: "[02] Quality control"
        run: node node_modules/monecromanci-toolchain/build-templates/02-quality-control.mjs
      - name: "[03] Package apps"
        run: node node_modules/monecromanci-toolchain/build-templates/03-package-apps.mjs
      - name: Upload app drops
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: drops
          path: ${{ runner.temp }}/artifacts
          if-no-files-found: ignore
      - name: "[04] Publish libraries"
        if: ${{ github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
        run: node node_modules/monecromanci-toolchain/build-templates/04-publish-libs.mjs
      - name: "[05] Publish documentation"
        if: ${{ vars.PUBLISH_DOCS == 'true' }}
        run: node node_modules/monecromanci-toolchain/build-templates/05-publish-documentation.mjs
      - name: "[06] Summary"
        if: ${{ always() }}
        run: node node_modules/monecromanci-toolchain/build-templates/06-summary.mjs
