name: CI

# Generated by MoNecromanCI. Deliberately thin: Nx builds, 'nx release'
# versions from conventional commits and pushes ONLY a tag to main, and each
# app is packed into dist/drop/<type>-<name>.zip by its own 'package' target.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  # Lets the release step push the version tag nx release creates back to main.
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Version resolution needs the release tags.
      - run: git fetch --all --prune --tags
        name: Fetch branches and release tags

      - run: git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com"
        name: Set the git identity used for release tags

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
        name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Installs the fixed Python toolchain (ruff, pytest, build, twine) — written
      # by 'mnci add' to requirements-dev.txt on the first Python project. Plain
      # pip, no uv/Poetry: portable guard skips cleanly on a workspace with none.
      - run: node -e "if(!require('node:fs').existsSync('requirements-dev.txt')){console.log('No Python projects - skipping.');process.exit(0)}const py=process.platform==='win32'?'python':'python3';process.exit(require('node:child_process').spawnSync(py+' -m pip install -r requirements-dev.txt',{stdio:'inherit',shell:true}).status ?? 1)"
        name: Install Python dependencies (ruff, pytest, build, twine)

      # Editable-installs every Python project into one shared environment, the
      # pip-world counterpart of 'npm install' hoisting every workspace package
      # into one root node_modules — so a project that imports an internal lib
      # (normally vendored only at build time) can resolve that import at
      # lint/test time too. Portable guard skips cleanly on a workspace with none.
      - run: node -e "const fs=require('node:fs'),path=require('node:path');const editableDirs=[...fs.globSync('apps/*/pyproject.toml'),...fs.globSync('python-packages/*/pyproject.toml'),...fs.globSync('libs/*/pyproject.toml')].map((p)=>path.dirname(p));const requirementsFiles=fs.globSync('apps/*/requirements.txt');if(editableDirs.length===0&&requirementsFiles.length===0){console.log('No Python projects - skipping.');process.exit(0)}const args=['-m','pip','install','--quiet',...editableDirs.flatMap((d)=>['-e',d]),...requirementsFiles.flatMap((f)=>['-r',f])];const py=process.platform==='win32'?'python':'python3';process.exit(require('node:child_process').spawnSync(py,args,{stdio:'inherit'}).status ?? 1)"
        name: Install Python project dependencies (editable, workspace-wide)

      # Fails fast, with an unambiguous message, when a stale TypeScript project
      # reference (or another sync generator's drift) was never synced+committed
      # locally — sync.applyChanges (nx.json) only auto-applies interactively, so
      # CI still needs its own explicit, early check rather than surfacing this as
      # a confusing failure buried inside the build step below.
      - run: npx nx sync:check
        name: Verify the workspace is synced (run 'npx nx sync' locally and commit if this fails)

      # One verify for every run (PR and main). `npm run lint` abstracts the chosen
      # linter (eslint via nx, or oxlint), so the workflow needs no linter branch;
      # Nx cache makes unchanged test/build projects instant.
      - run: npm run lint
        name: Lint
      # `lint` here also runs any Nx lint targets `npm run lint` does not cover —
      # notably Python's ruff (every Python project owns a hand-authored `lint`
      # target). For the eslint stack the JS lint runs twice, but Nx caches the
      # repeat instantly.
      - run: npx nx run-many -t lint,test,build
        name: Lint, test and build everything

      # Pack every app into dist/drop/<type>-<name>.zip via each app's 'package'
      # target. Portable guard: skip cleanly when the workspace has no apps yet.
      - run: node -e "const fs=require('node:fs');fs.mkdirSync('dist/drop',{recursive:true});if(fs.globSync('apps/*/project.json').length===0){console.log('No apps to pack - skipping.');process.exit(0)}process.exit(require('node:child_process').spawnSync('npx nx run-many -t package',{stdio:'inherit',shell:true}).status ?? 1)"
        name: Pack all apps (one zip per app -> dist/drop)
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
        with:
          name: drop
          path: dist/drop
          if-no-files-found: ignore

      # Version + tag + publish, in one release, for npm (packages/*) AND Python
      # (python-packages/*) — conventional commits, tag-only push. Portable guard:
      # nx release errors on an empty scope, so skip cleanly when there is nothing
      # to release. When there are Python packages and an Azure feed, twine
      # publish credentials are exported (raw PAT, decoded from the base64 secret).
      - run: node -e "const fs=require('node:fs'),cp=require('node:child_process');const hasNpm=fs.globSync('packages/*/package.json').length>0;const hasPython=fs.globSync('python-packages/*/pyproject.toml').length>0;if(!hasNpm&&!hasPython){console.log('Nothing to release - skipping.');process.exit(0)}const env={...process.env};process.exit(cp.spawnSync('npx nx release --yes',{stdio:'inherit',shell:true,env}).status ?? 1)"
        name: Release — version, tag and publish (npm + Python)
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # nx release's own git push (release.git.push) is deliberately left off: it
      # only runs when a remote GitHub/GitLab Release is configured, which this
      # workflow never does, so it would never push the tag the step above just
      # created. Pushed explicitly, unconditionally (a no-op when nothing released)
      # once tagging is guaranteed to have already happened.
      - run: git push origin --tags
        name: Push release tags (nx release's own push never runs without a remote Release configured)
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}

  # Real, empirical proof that mnci works on Windows, not just a static code
  # review: builds the CLI and runs the actual e2e suite (real `mnci new`/
  # `add`, real npm/pip installs, real zip packaging) on a genuine
  # windows-latest runner. Independent of the `ci` job above — never touches
  # release/tags, so it carries zero risk to the release pipeline and can run
  # in parallel. windows-latest has no python3.exe (only python.exe), so this
  # is exactly the environment that would have caught the python3-hard-coded
  # bug fixed in PR #55 before it shipped.
  e2e-windows:
    name: e2e (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
        name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npx nx build @mnci/cli
        name: Build @mnci/cli

      - run: node packages/cli/e2e/cli.e2e.mjs
        name: Run the real e2e suite (mnci new/add, real npm/pip installs and zip packaging)
