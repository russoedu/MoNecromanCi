steps:
  - task: npmAuthenticate@0
    displayName: "[04] Authenticate npm registry"
    condition: and(succeeded(), eq(variables['HAS_PUBLISHABLE_LIBS'], 'true'))
    inputs:
      workingFile: .npmrc

  # Versions are computed by `nx release version` from conventional commits, then
  # committed, tagged and pushed back to the branch before publishing. Requires the
  # "Project Collection Build Service" account to have Contribute permission on
  # this repo (Project Settings -> Repositories -> Security) since the checkout's
  # persistCredentials is what lets the script push. Runs on a publish branch
  # (master or main) for non-PR builds; the script re-checks these.
  - script: node .build-templates/04-publish-libs.mjs
    displayName: "[04] Publish affected libraries"
    condition: >
      and(succeeded(),
          eq(variables['HAS_PUBLISHABLE_LIBS'], 'true'),
          ne(variables['Build.Reason'], 'PullRequest'),
          or(eq(variables['Build.SourceBranchName'], 'master'),
             eq(variables['Build.SourceBranchName'], 'main')))
    env:
      NODE_AUTH_TOKEN: $(NODE_AUTH_TOKEN)
